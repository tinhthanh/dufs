name: Build and Deploy vg-zl-dufs
on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  SERVICE_NAME: vg-zl-dufs
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # === JOB 1: BUILD & PUSH (Thêm mới) ===
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

  # === JOB 2: DEPLOY (Cập nhật script mount volume) ===
  deploy:
    name: Deploy to Production Server
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read and Encode docker-compose
        id: read_file
        run: echo "content=$(base64 -w0 docker-compose.prod.yml)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            
            # Định nghĩa đường dẫn chuẩn
            REPO_DIR="/home/vetgo/cicd/app_services/repo/${{ env.SERVICE_NAME }}"
            DATA_DIR="/data/apps/${{ env.SERVICE_NAME }}"
            
            echo "🛠 Creating directory structure..."
            mkdir -p "$REPO_DIR"
            
            # Tạo thư mục data theo rule chuẩn
            mkdir -p "$DATA_DIR/storage"
            mkdir -p "$DATA_DIR/config"
            mkdir -p "$DATA_DIR/logs"
            
            echo "🚀 Deploying..."
            echo "${{ steps.read_file.outputs.content }}" | base64 -d > "$REPO_DIR/docker-compose.prod.yml"
            cd "$REPO_DIR"
            
            # Tạo .env chứa thông tin image
            cat << ENVEOF > .env
            DOCKERHUB_USERNAME=${{ env.DOCKERHUB_USERNAME }}
            SERVICE_NAME=${{ env.SERVICE_NAME }}
            ENVEOF
            
            # Pull image mới nhất vừa build
            docker-compose --env-file .env -f docker-compose.prod.yml pull
            docker-compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            
            echo "✅ Deployment successful for ${{ env.SERVICE_NAME }}"
